<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Políticas de Privacidade</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 800px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2rem;
      text-align: center;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .projects {
      display: grid;
      gap: 20px;
    }

    .project-card {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 25px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .project-card:hover {
      border-color: #667eea;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
      transform: translateY(-2px);
    }

    .project-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }

    .project-description {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      color: #999;
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .project-name {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Políticas de Privacidade</h1>
    <p class="subtitle">Selecione o projeto para visualizar a política de privacidade</p>

    <div class="projects">
      <a href="ciaf/politica-privacidade-ciaf.html" class="project-card">
        <div class="project-name">CIAF Mobile 2.0</div>
        <div class="project-description">
          Política de Privacidade do aplicativo CIAF Mobile 2.0 - Polícia Militar do Estado de São Paulo
        </div>
      </a>

      <!-- Adicione novos projetos aqui -->
      
    </div>

    <footer>
      Políticas de Privacidade | Atualizado em 2026
    </footer>
  </div>
</body>

</html>
